<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Bookstore</title>
<style>
  :root {
    --ink: #0f172a;
    --muted: #64748b;
    --line: #dbe3ee;
    --panel: #ffffff;
    --brand: #1248b3;
    --brand2: #0f9d58;
    --danger: #b42318;
    --danger-bg: #feeceb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", Tahoma, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 400px at 15% -10%, #d9e7ff 20%, transparent 60%),
      radial-gradient(900px 360px at 90% 110%, #dcfce7 15%, transparent 55%),
      #f5f8fd;
    display: grid;
    place-items: center;
    padding: 16px;
  }
  .shell {
    width: min(980px, 100%);
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 20px 45px rgba(18, 72, 179, .12);
  }
  .left {
    padding: 34px;
    background: linear-gradient(140deg, #1248b3, #2563eb);
    color: #fff;
  }
  .left h1 { margin: 0 0 8px; font-size: 31px; line-height: 1.2; }
  .left p { margin: 0 0 20px; opacity: .93; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 1px solid rgba(255,255,255,.35);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    backdrop-filter: blur(2px);
  }
  .entry {
    padding: 30px;
    display: flex;
    align-items: center;
  }
  form { width: 100%; }
  h2 { margin: 0 0 5px; font-size: 24px; }
  .sub { margin: 0 0 14px; color: var(--muted); }
  label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 700; }
  input {
    width: 100%;
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 9px 11px;
    font-size: 14px;
    margin-bottom: 12px;
  }
  input:focus { outline: 2px solid #dbeafe; border-color: #93c5fd; }
  .err {
    background: var(--danger-bg);
    color: var(--danger);
    border-radius: 9px;
    padding: 10px 12px;
    margin-bottom: 10px;
    font-size: 14px;
  }
  .btn {
    width: 100%;
    min-height: 43px;
    border: 0;
    border-radius: 10px;
    background: var(--brand);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
  }
  .links {
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 13px;
  }
  .links a { color: #0f172a; text-decoration: none; }
  .links a:hover { text-decoration: underline; }
  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr; }
    .left { padding: 22px; }
    .entry { padding: 22px; }
  }
</style>
</head>
<body>
  <div class="shell">
    <section class="left">
      <h1>Bookstore Admin Portal</h1>
      <p>Dang nhap voi tai khoan manager de vao Dashboard quan tri he thong microservices.</p>
      <div class="chips">
        <span class="chip">📊 Dashboard</span>
        <span class="chip">📦 Orders</span>
        <span class="chip">💳 Payments</span>
        <span class="chip">🚚 Shipments</span>
      </div>
    </section>
    <section class="entry">
      <form method="post" action="/admin/login/submit/">
        {% csrf_token %}
        <h2>Dang nhap Admin</h2>
        <p class="sub">Nhap email manager va ma nhan vien (employee_id).</p>

        {% if error %}
          <div class="err">{{ error }}</div>
        {% endif %}

        <label for="email">Email manager</label>
        <input id="email" name="email" type="email" required value="{{ email|default:'' }}" placeholder="admin@company.com">

        <label for="employee_id">Ma nhan vien</label>
        <input id="employee_id" name="employee_id" required value="{{ employee_id|default:'' }}" placeholder="MGR001">

        <button class="btn" type="submit">Vao trang Admin</button>

        <div class="links">
          <a href="/user/login/">User Login</a>
          <a href="/shop/">User Store</a>
        </div>
      </form>
    </section>
  </div>
</body>
</html>
